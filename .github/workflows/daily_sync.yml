name: Daily Data Sync

on:
  schedule:
    - cron: '0 6 * * *'   # 每天 06:00 UTC
  workflow_dispatch:      # 手動觸發按鈕

env:
  PYTHON_VERSION: 3.11
  MLFLOW_TRACKING_URI: https://verbose-space-waffle-7v6wvqw4wxp5hrvw6-8000.app.github.dev/mlflow

jobs:
  data-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements*.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements-data.txt
          pip install -e .                    # ← 關鍵：讓 src 變成可 import 模組

      - name: Download latest spot & CMIP6 data
        run: |
          bash scripts/fetch_cmip6.sh
          python -m cmip6_commodity.data.spot

      - name: Build features
        run: |
          python -m cmip6_commodity.climate_processor
          python -m cmip6_commodity.feature_engineer

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: daily-data-artifacts
          path: |
            data/raw/
            data/processed/

      - name: Commit new data artifacts
        run: |
          git config --local user.email "ci@github"
          git config --local user.name "GitHub CI"
          git add data/raw/ data/processed/
          git diff --staged --quiet || git commit -m "ci: update daily data [skip ci]"
          git push
