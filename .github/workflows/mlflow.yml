name: MLflow Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:          # 手动触发按钮

jobs:
  pipeline:
    runs-on: ubuntu-latest
    # 使用 GitHub 官方 Codespaces 容器（4-core，8 GB）
    container:
      image: mcr.microsoft.com/devcontainers/python:3.12

    steps:
      # ---------- 1. 检出代码 ----------
      - name: Checkout
        uses: actions/checkout@v4

      # ---------- 2. 缓存 pip ----------
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

      # ---------- 3. 安装系统依赖 ----------
      - name: Install system deps
        run: |
          apt-get update
          apt-get install -y wget curl net-tools

      # ---------- 4. 安装 Python 依赖 ----------
      - name: Install Python packages
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ---------- 5. 生成气象特征（三商品） ----------
      - name: Generate features (rice/corn/barley)
        run: |
          for crop in rice corn barley; do
            echo "=== 特征 $crop ==="
            python -m cmip6_commodity.${crop}_processor
          done

      # ---------- 6. 训练 + 注册（三商品） ----------
      - name: Train & Register (rice/corn/barley)
        run: |
          for crop in rice corn barley; do
            echo "=== 训练 $crop ==="
            COMMODITY=$crop python train.py
          done

      # ---------- 7. 启动 MLflow UI 并等待端口就绪 ----------
      - name: Start MLflow UI & wait port
        run: |
          nohup mlflow ui --host 0.0.0.0 --port 8000 > mlflow.log 2>&1 &
          echo "⏳ 等待 MLflow 端口 8000 就绪..."
          for i in {1..60}; do
            if curl -f http://localhost:8000 > /dev/null 2>&1; then
              echo "✅ MLflow UI 已就绪"
              break
            fi
            echo "⏳ 第 $i/60 秒重试..."
            sleep 1
          done
          # 如果 60 秒仍失败，打印日志
          if ! curl -f http://localhost:8000 > /dev/null 2>&1; then
            echo "❌ 无法连接，查看日志："
            cat mlflow.log
            exit 1
          fi

      # ---------- 8. 输出本次最佳模型信息 ----------
      - name: Print best models
        run: |
          echo "=== 本次最佳模型 ==="
          for crop in rice corn barley; do
            r2=$(grep -oP "R²=\K[0-9.]+" mlruns/*/$(ls -t mlruns/*/meta.yaml | head -1 | xargs grep -l "${crop}")/../metrics/r2 2>/dev/null || echo "0")
            echo "${crop}-price-model  R²=${r2}"
          done

      # ---------- 9.  artifacts（可选，把模型 artifact 留下） ----------
      - name: Upload MLflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts
          path: mlruns/
