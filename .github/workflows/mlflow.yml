name: MLflow Pipeline (Zero-Codespaces)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
      - run: |
          sudo apt-get update
          sudo apt-get install -y wget curl net-tools
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: 生成特征 & 训练（三商品）
        run: |
          for crop in rice corn barley; do
            echo "=== 特征 $crop ==="
            python -m cmip6_commodity.${crop}_processor
            echo "=== 训练 $crop ==="
            COMMODITY=$crop python train.py
          done
      - name: 启动 MLflow UI 并等待端口就绪
        run: |
          nohup mlflow ui --host 0.0.0.0 --port 8000 > mlflow.log 2>&1 &
          for i in {1..60}; do
            curl -f http://localhost:8000 > /dev/null 2>&1 && echo "✅ MLflow UI 已就绪" && break
            echo "⏳ 第 $i/60 秒重试..."
            sleep 1
          done
          if ! curl -f http://localhost:8000 > /dev/null 2>&1; then
            echo "❌ 无法连接，查看日志："
            cat mlflow.log
            exit 1
          fi
      - name: 输出最佳模型信息
        run: |
          for crop in rice corn barley; do
            r2=$(grep -oP "R²=\K[0-9.]+" mlruns/*/$(ls -t mlruns/*/meta.yaml | head -1 | xargs grep -l "${crop}")/../metrics/r2 2>/dev/null || echo "0")
            echo "${crop}-price-model  R²=${r2}"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts
          path: |
            mlruns/
            mlflow.log
